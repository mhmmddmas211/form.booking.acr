        /* Container tengah */

            font-size: 17px;
            font-weight: 600;
            box-shadow: 0px 3px 10px rgba(255, 215, 0, 0.3);

            transform: scale(1.02);
        }

        /* Footer */
        .footer {
            margin-top: 40px;
            padding-bottom: 25px;
            font-size: 12px;

        }

        /* Responsif HP kecil */

            h1 {

            }
            .link-btn {
